name: Deploy Omnius Backend to Azure

on:
  push:
    branches: [ "main", "feature/refactor-analysis-engine" ]
  workflow_dispatch:

env:
  ACR_NAME: omniusregflx
  APP_NAME: omnius-api-flx

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: cd backend && uv pip install --system -r requirements.txt pytest httpx
      - name: Run tests
        env:
          GROQ_API_KEY: fake-key
          TAVILY_API_KEY: fake-key
        run: cd backend && export PYTHONPATH=. && uv run pytest

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push container image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Grant Web App access to ACR (Managed Identity)
        run: |
          # Aktifkan system identity di Web App
          az webapp identity assign --name ${{ env.APP_NAME }} --resource-group omniusregflx

          # Ambil principal ID dari identity Web App
          PRINCIPAL_ID=$(az webapp identity show --name ${{ env.APP_NAME }} --resource-group omniusregflx --query principalId -o tsv)

          # Ambil ID dari ACR
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --query id -o tsv)

          # Berikan izin 'AcrPull' ke Web App
          az role assignment create --assignee $PRINCIPAL_ID --scope $ACR_ID --role AcrPull 2>/dev/null || true

      - name: Deploy container image to Web App
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group omniusregflx \
            --container-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }} \
            --container-registry-url https://${{ env.ACR_NAME }}.azurecr.io

      - name: Set App Settings in Azure
        run: |
          az webapp config appsettings set \
            --name ${{ env.APP_NAME }} \
            --resource-group omniusregflx \
            --settings \
              GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
              ALLOWED_ORIGINS="*" \
              WEBSITES_PORT="8080" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800"

      - name: Restart Web App
        run: |
          # Matikan HTTP/2 agar SSE (Server-Sent Events) bisa bekerja dengan benar
          az webapp config set \
            --name ${{ env.APP_NAME }} \
            --resource-group omniusregflx \
            --http20-enabled false
          az webapp restart --name ${{ env.APP_NAME }} --resource-group omniusregflx
