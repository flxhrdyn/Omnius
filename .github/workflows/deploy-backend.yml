name: Deploy Omnius Backend to Azure

on:
  push:
    branches: [ "main", "feature/refactor-analysis-engine" ]
  workflow_dispatch:

env:
  ACR_NAME: omniusregflx
  APP_NAME: omnius-api-flx

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: cd backend && uv pip install --system -r requirements.txt pytest httpx
      - name: Run tests
        env:
          GROQ_API_KEY: fake-key
          TAVILY_API_KEY: fake-key
        run: cd backend && export PYTHONPATH=. && uv run pytest

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push container image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Set App Settings in Azure
        run: |
          az webapp config appsettings set --name ${{ env.APP_NAME }} --resource-group omniusregflx --settings \
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }} \
            ALLOWED_ORIGINS="*"
